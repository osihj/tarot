<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心鏡似境 ‧ 像素占卜</title>
    <style>
        /* 溫馨、雅緻的日系水彩與復古寶可夢卡帶配色 */
        :root {
            --jp-bg: #fcfaf7;          /* 溫暖的和紙米色 */
            --jp-paper: #ffffff;       /* 潔淨白 */
            --jp-wood: #4a3e3d;        /* 柔和木質褐 */
            --jp-gold: #c5a880;        /* 霧金 */
            --jp-mint: #a2b9bc;        /* 水彩粉綠 */
            --jp-cherry: #e8b4b8;      /* 水彩櫻粉 */
            --border-gold: #e2d3be;    /* 經典雙線金框 */
        }

        body {
            background-color: var(--jp-bg);
            color: var(--jp-wood);
            font-family: "Helvetica Neue", "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.08em;
        }

        /* 主容器 */
        .wrapper {
            max-width: 800px;
            width: 100%;
            background: var(--jp-paper);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(180, 165, 150, 0.08);
            border: 1px solid rgba(197, 168, 128, 0.2);
            padding: 40px 25px;
            box-sizing: border-box;
            margin-bottom: 40px;
            position: relative;
        }

        /* 標題區 */
        .title-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .title-area h1 {
            color: var(--jp-wood);
            font-size: 1.8rem;
            margin: 0;
            font-weight: 500;
            letter-spacing: 8px;
        }

        /* 10秒靜心吸吐儀式區（全像素精細樹苗） */
        .zen-ritual-box {
            background: #fafcf9;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 35px;
            border: 1px solid rgba(197, 168, 128, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ritual-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--jp-wood);
            letter-spacing: 2px;
        }

        /* 🌲 像素風靜心小樹 SVG 容器 */
        .tree-animation-container {
            width: 130px;
            height: 130px;
            margin: 15px 0;
            background: #ffffff;
            border-radius: 8px;
            border: 2px solid var(--jp-wood);
            box-shadow: 4px 4px 0px rgba(74, 62, 61, 0.15);
            overflow: hidden;
            position: relative;
        }

        /* 呼吸引導文字 */
        .ritual-guide {
            font-size: 0.88rem;
            color: var(--jp-wood);
            min-height: 24px;
            font-weight: 500;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* 靜心啟動按鈕 */
        .btn-jp {
            background-color: var(--jp-wood);
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(74, 62, 61, 0.15);
            margin-top: 15px;
        }

        .btn-jp:hover {
            background-color: #382e2d;
            transform: translateY(-1px);
        }

        .btn-jp:disabled {
            background-color: #cccbc8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 牌陣設計 */
        .spread-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }

        .spread-active {
            opacity: 1;
        }

        .card-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 155px;
        }

        .time-tag {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--jp-wood);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        /* 牌卡盒與翻轉 */
        .card-box {
            width: 150px;
            height: 265px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.1);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* 卡背：和風像素紋樣 */
        .card-back {
            background-color: #fafcf9;
            border: 2px solid var(--jp-wood);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 3px 3px 0px rgba(74, 62, 61, 0.1);
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 10px, #ebdccb 11px, #ebdccb 12px, transparent 13px);
            background-size: 16px 16px;
        }

        /* 像素中心鏡飾 */
        .card-back::before {
            content: "";
            width: 24px;
            height: 24px;
            border: 2px solid var(--jp-gold);
            background-color: #fafcf9;
            image-rendering: pixelated;
        }

        /* 卡正面 */
        .card-front {
            transform: rotateY(180deg);
            background-color: #ffffff;
            color: #2b251d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px rgba(74, 62, 61, 0.1);
            border: 2px solid var(--jp-wood);
            padding: 10px;
        }

        /* 像素插畫圖區 */
        .watercolor-illustration {
            width: 125px;
            height: 235px;
            border: 1px solid #eae2d5;
            background-color: #fcfbf7;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            image-rendering: pixelated;
        }

        /* 翻牌後顯示於卡片下方的置中卡牌名稱 */
        .card-under-name {
            font-size: 0.9rem;
            color: var(--jp-wood);
            letter-spacing: 2px;
            margin-top: 15px;
            font-weight: 500;
            text-align: center;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            width: 100%;
        }

        .card-under-name.show {
            opacity: 1;
        }

        .rev-effect {
            transform: rotate(180deg);
        }

        /* 報告區 */
        .report-area {
            display: none;
            border-top: 1px solid rgba(197, 168, 128, 0.2);
            padding-top: 35px;
            margin-top: 15px;
            animation: softFade 0.6s ease forwards;
        }

        @keyframes softFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .report-main-title {
            color: var(--jp-wood);
            font-size: 1.2rem;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
        }

        .report-card {
            background-color: var(--jp-paper);
            border: 2px solid var(--jp-wood);
            border-radius: 4px;
            padding: 22px;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .report-card-img {
            width: 80px;
            height: 135px;
            border: 1px solid var(--jp-wood);
            flex-shrink: 0;
            background-color: #fafcf9;
            image-rendering: pixelated;
        }

        .report-card-text {
            flex-grow: 1;
        }

        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px dashed rgba(197, 168, 128, 0.2);
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        .report-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--jp-wood);
        }

        .report-card-roman {
            font-family: "Times New Roman", Georgia, serif;
            font-size: 1rem;
            color: var(--jp-gold);
        }

        .report-card-keyword {
            font-size: 0.8rem;
            color: var(--jp-gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .report-card-detail {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #554a3f;
            margin: 0;
        }

        .action-row {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-sub {
            background-color: #fff;
            color: var(--jp-wood);
            border: 1px solid #dcd3c7;
            padding: 10px 30px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sub:hover {
            border-color: var(--jp-gold);
            background-color: #faf6f0;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--jp-gold);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="title-area">
            <h1>心鏡似境</h1>
        </div>

        <div class="zen-ritual-box">
            <div class="ritual-title">心鏡澄清 ‧ 呼吸調息</div>
            
            <div class="tree-animation-container">
                <svg viewBox="0 0 40 40" width="100%" height="100%" id="treeSvg" style="image-rendering: pixelated;">
                    <rect x="0" y="34" width="40" height="6" fill="#302524" />
                    <rect x="0" y="35" width="40" height="3" fill="#8c6d58" />
                    <rect x="0" y="34" width="40" height="1" fill="#a2b9bc" />
                    
                    <g id="treeTrunk">
                        <rect x="17" y="30" width="6" height="4" fill="#302524" />
                        <rect x="18" y="30" width="4" height="4" fill="#604a49" />
                        <g id="trunkSegment1" opacity="0" style="transition: opacity 0.5s ease 0.5s;">
                            <rect x="18" y="24" width="4" height="6" fill="#302524" />
                            <rect x="19" y="24" width="2" height="6" fill="#7d6160" />
                            <rect x="19" y="24" width="1" height="6" fill="#9e807f" /> </g>
                        <g id="trunkSegment2" opacity="0" style="transition: opacity 0.5s ease 1.5s;">
                            <rect x="18" y="18" width="4" height="6" fill="#302524" />
                            <rect x="19" y="18" width="2" height="6" fill="#7d6160" />
                        </g>
                    </g>
                    
                    <g id="treeLeaves" opacity="0" style="transition: opacity 1.5s ease 2.5s;">
                        <path d="M 14,10 H 26 V 11 H 28 V 13 H 29 V 19 H 28 V 21 H 26 V 22 H 14 V 21 H 12 V 19 H 11 V 13 H 12 V 11 H 14 Z" fill="#302524" />
                        <path d="M 15,11 H 25 V 12 H 27 V 14 H 28 V 18 H 27 V 20 H 25 V 21 H 15 V 20 H 13 V 18 H 12 V 14 H 13 V 12 H 15 Z" fill="#3c5e32" />
                        <path d="M 16,12 H 24 V 13 H 26 V 15 H 27 V 17 H 26 V 19 H 24 V 20 H 16 V 19 H 14 V 17 H 13 V 15 H 14 V 13 H 16 Z" fill="#5c9c42" />
                        <rect x="16" y="13" width="5" height="3" fill="#a4db44" />
                        <rect x="21" y="14" width="3" height="2" fill="#a4db44" />
                        <rect x="17" y="14" width="1" height="1" fill="#ffffff" />
                    </g>

                    <g id="cherryBlossoms" opacity="0" style="transition: opacity 2s ease 5s;">
                        <g transform="translate(17, 3)">
                            <path d="M 2,0 H 4 V 1 H 5 V 0 H 7 V 1 H 8 V 3 H 7 V 4 H 5 V 5 H 4 V 6 H 2 V 5 H 1 V 4 H 0 V 1 H 1 V 0 Z" fill="#302524" />
                            <path d="M 2,1 H 3 V 2 H 4 V 1 H 6 V 2 H 7 V 3 H 6 V 4 H 4 V 5 H 3 V 4 H 1 V 3 H 2 V 1 Z" fill="#e8b4b8" />
                            <rect x="2" y="1" width="1" height="1" fill="#ffffff" />
                        </g>
                        <g transform="translate(6, 12) scale(0.7)">
                            <path d="M 2,0 H 4 V 1 H 5 V 0 H 7 V 1 H 8 V 3 H 7 V 4 H 5 V 5 H 4 V 6 H 2 V 5 H 1 V 4 H 0 V 1 H 1 V 0 Z" fill="#302524" />
                            <path d="M 2,1 H 3 V 2 H 4 V 1 H 6 V 2 H 7 V 3 H 6 V 4 H 4 V 5 H 3 V 4 H 1 V 3 H 2 V 1 Z" fill="#f2c4c9" />
                        </g>
                        <g transform="translate(27, 10) scale(0.7)">
                            <path d="M 2,0 H 4 V 1 H 5 V 0 H 7 V 1 H 8 V 3 H 7 V 4 H 5 V 5 H 4 V 6 H 2 V 5 H 1 V 4 H 0 V 1 H 1 V 0 Z" fill="#302524" />
                            <path d="M 2,1 H 3 V 2 H 4 V 1 H 6 V 2 H 7 V 3 H 6 V 4 H 4 V 5 H 3 V 4 H 1 V 3 H 2 V 1 Z" fill="#f4ccd1" />
                        </g>
                    </g>
                </svg>
            </div>

            <div class="ritual-guide" id="ritualGuide">準備好後，請點擊按鈕開始吸吐靜心</div>
            <button class="btn-jp" id="startBtn" onclick="startBreathingRitual()">開始靜心調息</button>
        </div>

        <div class="spread-row" id="spreadRow">
            <div class="card-column">
                <div class="time-tag">過去之因</div>
                <div class="card-box" onclick="drawCard(0)">
                    <div class="card-inner" id="inner0">
                        <div class="face card-back"></div>
                        <div class="face card-front" id="front0"></div>
                    </div>
                </div>
                <div class="card-under-name" id="nameLabel0"></div>
            </div>
            <div class="card-column">
                <div class="time-tag">現在之境</div>
                <div class="card-box" onclick="drawCard(1)">
                    <div class="card-inner" id="inner1">
                        <div class="face card-back"></div>
                        <div class="face card-front" id="front1"></div>
                    </div>
                </div>
                <div class="card-under-name" id="nameLabel1"></div>
            </div>
            <div class="card-column">
                <div class="time-tag">未來之象</div>
                <div class="card-box" onclick="drawCard(2)">
                    <div class="card-inner" id="inner2">
                        <div class="face card-back"></div>
                        <div class="face card-front" id="front2"></div>
                    </div>
                </div>
                <div class="card-under-name" id="nameLabel2"></div>
            </div>
        </div>

        <div class="report-area" id="reportArea">
            <div class="report-main-title">心鏡映照解讀報告</div>
            <div id="reportContent"></div>
            
            <div class="action-row">
                <button class="btn-sub" onclick="copyReportText()">複製此占卜報告</button>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 心鏡似境
    </div>

    <script>
        /* 🎨 寶可夢卡帶風格 (Pokemon Retro GBA Style) 精緻像素 SVG 生成範本 */
        const pixelTemplates = {
            // 大阿爾克那：精緻的像素心靈魔方與對應元素
            major: (id) => {
                const colors = ["#e8b4b8", "#a2b9bc", "#c5a880", "#8cb382", "#ebdccb"];
                const c = colors[id % colors.length];
                return `<svg viewBox="0 0 40 48" width="100%" height="100%" style="image-rendering: pixelated;">
                    <rect width="40" height="48" fill="#fcfbf7"/>
                    <rect x="2" y="2" width="36" height="44" fill="none" stroke="#302524" stroke-width="2"/>
                    <rect x="10" y="14" width="20" height="20" fill="#302524"/>
                    <rect x="11" y="15" width="18" height="18" fill="${c}"/>
                    <rect x="11" y="15" width="18" height="6" fill="#ffffff" opacity="0.4"/>
                    <rect x="15" y="20" width="10" height="10" fill="#302524"/>
                    <rect x="16" y="21" width="8" height="8" fill="#ffffff"/>
                    <rect x="6" y="8" width="2" height="2" fill="#c5a880"/>
                    <rect x="32" y="8" width="2" height="2" fill="#c5a880"/>
                    <rect x="6" y="38" width="2" height="2" fill="#c5a880"/>
                    <rect x="32" y="38" width="2" height="2" fill="#c5a880"/>
                </svg>`;
            },
            // 聖杯組：精雕細琢的像素聖杯與流動水滴
            cup: (num) => {
                return `<svg viewBox="0 0 40 48" width="100%" height="100%" style="image-rendering: pixelated;">
                    <rect width="40" height="48" fill="#fcfbf7"/>
                    <rect x="2" y="2" width="36" height="44" fill="none" stroke="#302524" stroke-width="2"/>
                    <path d="M 12,14 H 28 V 16 H 26 V 22 H 24 V 24 H 22 V 30 H 24 V 32 H 16 V 30 H 18 V 24 H 16 V 22 H 14 V 16 H 12 Z" fill="#302524"/>
                    <path d="M 14,16 H 26 V 18 H 24 V 22 H 22 V 24 H 18 V 22 H 16 V 18 H 14 Z" fill="#a2b9bc"/>
                    <path d="M 19,24 H 21 V 30 H 19 Z" fill="#a2b9bc"/>
                    <path d="M 18,30 H 22 V 31 H 18 Z" fill="#a2b9bc"/>
                    <rect x="15" y="16" width="10" height="2" fill="#e0f0f2"/>
                    <rect x="16" y="17" width="2" height="1" fill="#ffffff"/>
                    ${Array.from({length: Math.min(num, 4)}, (_, i) => 
                        `<g transform="translate(${8 + i * 7}, 6)">
                            <path d="M 1,0 H 3 V 1 H 4 V 0 H 6 V 1 H 7 V 3 H 6 V 4 H 4 V 5 H 3 V 4 H 1 V 3 H 0 V 1 Z" fill="#e8b4b8"/>
                         </g>`
                    ).join('')}
                </svg>`;
            },
            // 寶劍組：鋒利無比的像素寶劍與交織十字星芒
            sword: (num) => {
                return `<svg viewBox="0 0 40 48" width="100%" height="100%" style="image-rendering: pixelated;">
                    <rect width="40" height="48" fill="#fcfbf7"/>
                    <rect x="2" y="2" width="36" height="44" fill="none" stroke="#302524" stroke-width="2"/>
                    <g transform="translate(10, 0)">
                        <rect x="9" y="8" width="4" height="22" fill="#302524"/>
                        <rect x="10" y="9" width="2" height="20" fill="#b0c4de"/>
                        <rect x="10" y="9" width="1" height="20" fill="#ffffff"/> <rect x="6" y="30" width="10" height="3" fill="#302524"/>
                        <rect x="7" y="31" width="8" height="1" fill="#c5a880"/>
                        <rect x="10" y="33" width="2" height="5" fill="#302524"/>
                        <rect x="10" y="38" width="3" height="3" fill="#ebdccb"/>
                    </g>
                    ${Array.from({length: Math.min(num, 3)}, (_, i) => 
                        `<g transform="translate(${6 + i*13}, ${12 + i*8})">
                            <rect x="2" y="0" width="1" height="5" fill="#c5a880"/>
                            <rect x="0" y="2" width="5" height="1" fill="#c5a880"/>
                            <rect x="2" y="2" width="1" height="1" fill="#ffffff"/>
                         </g>`
                    ).join('')}
                </svg>`;
            },
            // 權杖組：帶有蓬勃嫩芽與木紋脈絡的像素手杖
            wand: (num) => {
                return `<svg viewBox="0 0 40 48" width="100%" height="100%" style="image-rendering: pixelated;">
                    <rect width="40" height="48" fill="#fcfbf7"/>
                    <rect x="2" y="2" width="36" height="44" fill="none" stroke="#302524" stroke-width="2"/>
                    <g transform="translate(4, 4)">
                        <path d="M 6,28 L 26,8" stroke="#302524" stroke-width="4" stroke-linecap="round"/>
                        <path d="M 6,28 L 26,8" stroke="#a28c75" stroke-width="2" stroke-linecap="round"/>
                        <path d="M 6,28 L 16,18" stroke="#7d6160" stroke-width="1" stroke-linecap="round"/> <rect x="24" y="5" width="4" height="4" fill="#302524"/>
                        <rect x="25" y="6" width="2" height="2" fill="#ebdccb"/>
                        <rect x="25" y="6" width="1" height="1" fill="#ffffff"/>
                    </g>
                    ${Array.from({length: Math.min(num, 4)}, (_, i) => 
                        `<g transform="translate(${8 + i*7}, ${12 + (i%2)*14})">
                            <rect x="1" y="1" width="3" height="3" fill="#302524"/>
                            <rect x="2" y="2" width="1" height="1" fill="#8cb382"/>
                         </g>`
                    ).join('')}
                </svg>`;
            },
            // 金幣組：亮麗奪目、帶有細緻十字星紋的像素星幣
            pentacle: (num) => {
                return `<svg viewBox="0 0 40 48" width="100%" height="100%" style="image-rendering: pixelated;">
                    <rect width="40" height="48" fill="#fcfbf7"/>
                    <rect x="2" y="2" width="36" height="44" fill="none" stroke="#302524" stroke-width="2"/>
                    <g transform="translate(10, 14)">
                        <path d="M 6,0 H 14 V 2 H 18 V 6 H 20 V 14 H 18 V 18 H 14 V 20 H 6 V 18 H 2 V 14 H 0 V 6 H 2 V 2 H 6 Z" fill="#302524" />
                        <path d="M 6,2 H 14 V 4 H 16 V 6 H 18 V 14 H 16 V 16 H 14 V 18 H 6 V 16 H 4 V 14 H 2 V 6 H 4 V 4 H 6 Z" fill="#c5a880" />
                        <path d="M 7,3 H 13 V 5 H 15 V 13 H 13 V 15 H 7 V 13 H 5 V 5 H 7 Z" fill="#e2c59a" />
                        <rect x="9" y="5" width="2" height="10" fill="#302524"/>
                        <rect x="5" y="9" width="10" height="2" fill="#302524"/>
                        <rect x="9" y="9" width="2" height="2" fill="#ffffff" /> </g>
                    ${Array.from({length: Math.min(num, 3)}, (_, i) => 
                        `<rect x="${6 + i*13}" y="${8 + (i%2)*24}" width="3" height="3" fill="#e2c59a" stroke="#302524" stroke-width="1"/>`
                    ).join('')}
                </svg>`;
            }
        };

        /* 完整 78 張塔羅牌結構定義 (22 張大阿爾克那 + 56 張小阿爾克那) */
        const originalDeck = [
            // 大阿爾克那 (0 - 21)
            { roman: "0", name: "愚者", svg: pixelTemplates.major(0), up: "純真、自由、冒險、全新起點", rev: "魯莽、不負責任、逃避現實" },
            { roman: "I", name: "魔術師", svg: pixelTemplates.major(1), up: "專注、創造力、計畫付諸實行", rev: "失去方向、執行力不足、幻滅" },
            { roman: "II", name: "女祭司", svg: pixelTemplates.major(2), up: "直覺、潛意識、沉靜智慧、洞察", rev: "內心焦躁、忽視直覺、表面化" },
            { roman: "III", name: "皇后", svg: pixelTemplates.major(3), up: "豐盛、精神滋養、美好契機、孕育", rev: "過度依賴、停滯不前、缺乏創造力" },
            { roman: "IV", name: "皇帝", svg: pixelTemplates.major(4), up: "秩序、領導力、穩定、建構安全感", rev: "專制、缺乏彈性、掌控欲過強" },
            { roman: "V", name: "教皇", svg: pixelTemplates.major(5), up: "引導、傳統信條、尋求智慧、契合", rev: "叛逆、過度教條、思想受限" },
            { roman: "VI", name: "戀人", svg: pixelTemplates.major(6), up: "心靈契合、融洽關係、面臨良善抉擇", rev: "溝通阻塞、和諧失衡、面臨矛盾" },
            { roman: "VII", name: "戰車", svg: pixelTemplates.major(7), up: "意志力、堅定目標、克服萬難取得勝利", rev: "方向偏差、失控、自我懷疑" },
            { roman: "VIII", name: "力量", svg: pixelTemplates.major(8), up: "內在韌性、溫柔克服、強大自律力", rev: "情緒失控、無力感、走向極端" },
            { roman: "IX", name: "隱士", svg: pixelTemplates.major(9), up: "內省、尋求真理、獨處沉澱、平靜", rev: "孤立、拒絕溝通、過度猜忌" },
            { roman: "X", name: "命運之輪", svg: pixelTemplates.major(10), up: "轉折良機、順應天意、命定之變", rev: "抗拒改變、時機未至、事倍功半" },
            { roman: "XI", name: "正義", svg: pixelTemplates.major(11), up: "誠實、因果平衡、明晰判斷、責任", rev: "不公對待、偏見、推卸責任" },
            { roman: "XII", name: "倒吊人", svg: pixelTemplates.major(12), up: "換位思考、奉獻、心甘情願的等待", rev: "無謂犧牲、抗拒等待、維持現狀的內耗" },
            { roman: "XIII", name: "死神", svg: pixelTemplates.major(13), up: "徹底告別、大破大立、迎向全新階段", rev: "拖延轉化、留戀過往、難以割捨" },
            { roman: "XIV", name: "節制", svg: pixelTemplates.major(14), up: "剛柔並濟、和諧重整、情緒沉澱", rev: "失去平衡、過度極端、溝通不良" },
            { roman: "XV", name: "惡魔", svg: pixelTemplates.major(15), up: "執念、物質束縛、內在欲望、警醒", rev: "重獲自由、覺醒、擺脫不健康習慣" },
            { roman: "XVI", name: "高塔", svg: pixelTemplates.major(16), up: "破除陳規、突來巨變、重組根基", rev: "逃避重整、局勢動盪、內心恐慌" },
            { roman: "XVII", name: "星星", svg: pixelTemplates.major(17), up: "希望、心靈療癒、平靜、指引之光", rev: "信心動搖、希望落空、感到迷失" },
            { roman: "XVIII", name: "月亮", svg: pixelTemplates.major(18), up: "未知不安、夢境啟示、潛在隱憂", rev: "疑惑消除、真相大白、重獲清晰" },
            { roman: "XIX", name: "太陽", svg: pixelTemplates.major(19), up: "能量充沛、純粹喜悅、成功、澄澈", rev: "短暫迷茫、前路受阻、熱情退卻" },
            { roman: "XX", name: "審判", svg: pixelTemplates.major(20), up: "心靈覺醒、重大決定、原諒、新契機", rev: "推遲抉擇、自我懷疑、忽視召喚" },
            { roman: "XXI", name: "世界", svg: pixelTemplates.major(21), up: "旅程歸一、功德圓滿、身心高度和諧", rev: "缺憾感、未竟之志、仍需努力" }
        ];

        // 動態生成小阿爾克那 56 張牌 (聖杯、寶劍、權杖、金幣各 14 張)
        const suits = [
            { id: "cup", name: "聖杯", template: pixelTemplates.cup, kws: ["情感交流", "人際連結", "感性滋養", "情緒波動"] },
            { id: "sword", name: "寶劍", template: pixelTemplates.sword, kws: ["理智判斷", "思維衝突", "精神挑戰", "決斷力"] },
            { id: "wand", name: "權杖", template: pixelTemplates.wand, kws: ["行動力", "熱情冒險", "事業挑戰", "直覺驅動"] },
            { id: "pentacle", name: "金幣", template: pixelTemplates.pentacle, kws: ["物質基礎", "現實累積", "自律耕耘", "穩定豐盛"] }
        ];

        suits.forEach(suit => {
            // 數字牌 Ace - 10
            for (let i = 1; i <= 10; i++) {
                const label = i === 1 ? "Ace" : i.toString();
                originalDeck.push({
                    roman: `${suit.name} ${label}`,
                    name: `${suit.name} ${label}`,
                    svg: suit.template(i),
                    up: `${suit.kws[0]}、${suit.kws[1]}的正向發展與累積`,
                    rev: `${suit.kws[2]}受阻、感到${suit.kws[3]}`
                });
            }
            // 侍從、騎士、皇后、國王
            const courts = ["侍從", "騎士", "皇后", "國王"];
            courts.forEach((court, idx) => {
                originalDeck.push({
                    roman: `${suit.name} ${court}`,
                    name: `${suit.name} ${court}`,
                    svg: suit.template(idx + 5),
                    up: `代表${suit.name}特質的${court}：展現成熟的${suit.kws[idx % 4]}與領導力`,
                    rev: `代表${suit.name}特質的${court}逆位：能量失衡、感到${suit.kws[(idx+1) % 4]}的挫折`
                });
            });
        });

        let drawnCards = [];
        let flipHistory = [false, false, false];

        // 10秒靜心呼吸儀式
        function startBreathingRitual() {
            const btn = document.getElementById("startBtn");
            const guide = document.getElementById("ritualGuide");
            const spread = document.getElementById("spreadRow");

            btn.disabled = true;
            document.getElementById("reportArea").style.display = "none";
            
            // 重置狀態與翻牌歷史
            drawnCards = [];
            flipHistory = [false, false, false];
            for (let i = 0; i < 3; i++) {
                document.getElementById(`inner${i}`).style.transform = "rotateY(0deg)";
                const label = document.getElementById(`nameLabel${i}`);
                label.classList.remove("show");
                label.innerText = "";
            }

            // 重置精緻像素樹生長進度
            const trunk1 = document.getElementById("trunkSegment1");
            const trunk2 = document.getElementById("trunkSegment2");
            const leaves = document.getElementById("treeLeaves");
            const blossoms = document.getElementById("cherryBlossoms");

            trunk1.style.opacity = "0";
            trunk2.style.opacity = "0";
            leaves.style.opacity = "0";
            blossoms.style.opacity = "0";

            // 吸氣 5 秒
            guide.innerText = "吸氣：深深吸氣，拂拭心鏡塵埃，感知內在生命萌發...";
            
            setTimeout(() => {
                trunk1.style.opacity = "1";
            }, 500);

            setTimeout(() => {
                trunk2.style.opacity = "1";
            }, 1500);

            setTimeout(() => {
                leaves.style.opacity = "1";
            }, 2500);

            // 呼氣 5 秒
            setTimeout(() => {
                guide.innerText = "呼氣：徐徐吐氣，心無旁騖，看，心樹上開出了溫柔的愛心...";
                blossoms.style.opacity = "1";
            }, 5000);

            // 圓滿
            setTimeout(() => {
                guide.innerText = "靜心功成，心湖澄明。請點選下方牌卡，傾聽此刻映照。";
                spread.classList.add("spread-active");
                btn.disabled = false;
                btn.innerText = "重新靜心調息";

                // 從完整的 78 張牌庫中隨機抽取 3 張
                const tempDeck = [...originalDeck];
                for (let i = 0; i < 3; i++) {
                    const idx = Math.floor(Math.random() * tempDeck.length);
                    const chosen = tempDeck.splice(idx, 1)[0];
                    const isRev = Math.random() < 0.5;
                    drawnCards.push({ card: chosen, isRev });
                }
            }, 10000);
        }

        // 翻牌
        function drawCard(index) {
            if (drawnCards.length === 0) {
                alert("請先點擊按鈕開始靜心吸吐，沉澱下來再翻牌。");
                return;
            }
            if (flipHistory[index]) return;

            const { card, isRev } = drawnCards[index];
            const frontDiv = document.getElementById(`front${index}`);

            frontDiv.innerHTML = `
                <div class="watercolor-illustration ${isRev ? 'rev-effect' : ''}">
                    ${card.svg}
                </div>
            `;

            const label = document.getElementById(`nameLabel${index}`);
            label.innerText = `${card.name}${isRev ? '（逆位）' : ''}`;
            label.classList.add("show");

            document.getElementById(`inner${index}`).style.transform = "rotateY(180deg)";
            flipHistory[index] = true;

            if (flipHistory.every(state => state === true)) {
                setTimeout(showWatercolorReport, 800);
            }
        }

        // 顯示解讀報告
        function showWatercolorReport() {
            const reportContent = document.getElementById("reportContent");
            reportContent.innerHTML = "";

            const timeline = [
                { label: "過去之因 (心鏡所照之源)" },
                { label: "現在之境 (當下投影之界)" },
                { label: "未來之象 (心念所指之途)" }
            ];

            drawnCards.forEach((item, i) => {
                const { card, isRev } = item;
                const kwList = isRev ? card.rev : card.up;
                const mainKw = kwList.split('、')[0];
                let desc = "";

                if (isRev) {
                    desc = `【境由心造】逆位牌卡意味著此刻你在這個維度可能感到些許迷茫或「${mainKw}」的瓶頸。外界的窒礙往往是心鏡蒙塵的反射。這是一個溫柔的契機，邀請你往內看，重新拂拭這面鏡子，境況自會隨著心境轉化而開朗。`;
                } else {
                    desc = `【心澄境生】正位牌卡代表著你與當下「${mainKw}」的和諧能量正緊密契合。當心鏡清澈明亮，映照出來的世界便充滿智慧與方向。請信任你此刻的清明直覺，順應當下的境遇前行。`;
                }

                reportContent.innerHTML += `
                    <div class="report-card">
                        <div class="report-card-img ${isRev ? 'rev-effect' : ''}">
                            ${card.svg}
                        </div>
                        <div class="report-card-text">
                            <div class="report-card-header">
                                <span class="report-card-title">${timeline[i].label} ─ ${card.name} (${isRev ? '逆位' : '正位'})</span>
                                <span class="report-card-roman">${card.roman}</span>
                            </div>
                            <div class="report-card-keyword" style="color: #6a8362; font-weight: bold; font-size: 0.85rem; margin-bottom: 4px;">
                                心靈語錄：${isRev ? '逆位能量的內省引導' : '正位能量的清明啟示'}
                            </div>
                            <div class="report-card-keyword">心靈印記：${kwList}</div>
                            <p class="report-card-detail">${desc}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById("reportArea").style.display = "block";
        }

        // 複製報告
        function copyReportText() {
            let copyText = `心鏡似境 ‧ 和風像素塔羅占卜報告\n\n`;
            drawnCards.forEach((item, i) => {
                const stages = ["過去", "現在", "未來"];
                copyText += `${stages[i]}：${item.card.name} (${item.isRev ? '逆位' : '正位'})\n`;
                copyText += `心靈印記：${item.isRev ? item.card.rev : item.card.up}\n\n`;
            });
            copyText += `願這場像素禪意調息，拂去你此時心頭的所有微瀾。`;

            navigator.clipboard.writeText(copyText).then(() => {
                alert("占卜報告已成功複製。");
            });
        }
    </script>
</body>
</html>
